<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseTrack — Retención de Socios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <p class="brand-kicker">Gimnasio · Panel operativo</p>
          <h1 class="brand-title">PulseTrack</h1>
        </div>
      </div>

      <div class="header-actions">
        <div class="model-status" id="modelStatus" aria-live="polite">
          <span class="status-dot"></span>
          <span>Modelo sin ejecutar</span>
        </div>
        <button type="button" class="btn btn-primary" id="runModelBtn">
          <span class="btn-icon" aria-hidden="true">▶</span>
          Ejecutar modelo
        </button>
      </div>
    </header>

    <div class="alert-banner" id="alertBanner" role="alert" hidden></div>

    <section class="toolbar">
      <label class="search-field" for="searchInput">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M20 20l-4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
          type="search"
          id="searchInput"
          placeholder="Buscar socio por nombre…"
          autocomplete="off"
        >
      </label>

      <div class="toolbar-meta">
        <span id="clientCount">0 socios</span>
        <span class="meta-sep" aria-hidden="true">·</span>
        <span id="riskCount">0 en riesgo</span>
      </div>
    </section>

    <main class="clients-panel" id="clientsPanel">
      <div class="panel-loading" id="panelLoading">
        <div class="loader-bars" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <p>Cargando socios del gimnasio…</p>
      </div>

      <div class="clients-grid" id="clientsGrid" hidden></div>

      <p class="empty-state" id="emptyState" hidden>
        No hay socios que coincidan con tu búsqueda.
      </p>
    </main>

    <!-- Panel colapsable: historial de sugerencias enviadas por Telegram -->
    <section class="sent-section">
      <button
        type="button"
        class="sent-toggle"
        id="sentToggleBtn"
        aria-expanded="false"
        aria-controls="sentPanel"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor" class="sent-toggle__icon">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
        </svg>
        Sugerencias enviadas por Telegram
        <svg viewBox="0 0 16 16" aria-hidden="true" class="sent-toggle__chevron">
          <path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="sent-panel" id="sentPanel" hidden>
        <div id="sentBody"></div>
      </div>
    </section>
  </div>

  <dialog class="detail-dialog" id="detailDialog" aria-labelledby="dialogTitle">
    <div class="dialog-inner">
      <header class="dialog-header">
        <div>
          <p class="dialog-kicker">Detalle de retención</p>
          <h2 id="dialogTitle">—</h2>
        </div>
        <button type="button" class="dialog-close" id="closeDialogBtn" aria-label="Cerrar">
          ✕
        </button>
      </header>

      <div class="dialog-body" id="dialogBody">
        <div class="dialog-loading" id="dialogLoading">
          <div class="loader-ring" aria-hidden="true"></div>
          <p>Analizando perfil del socio…</p>
        </div>
        <div class="dialog-content" id="dialogContent" hidden></div>
      </div>
    </div>
  </dialog>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
